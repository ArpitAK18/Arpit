<!DOCTYPE html>
<html>
<head>
<title>iPhone Calculator</title>

<style>
body {
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

.calculator {
  width: 260px;
}

#screen {
  width: 100%;
  height: 80px;
  background: black;
  color: white;
  border: none;
  font-size: 40px;
  text-align: right;
  padding: 10px;
  margin-bottom: 10px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 60px;
  border-radius: 50%;
  border: none;
  font-size: 22px;
  cursor: pointer;
  transition: 0.1s;
}

/* number buttons */
.num {
  background: #333;
  color: white;
}

/* operators */
.op {
  background: #ff9500;
  color: white;
}

/* top function buttons */
.func {
  background: #a5a5a5;
  color: black;
}

/* zero button style */
.zero {
  grid-column: span 2;
  border-radius: 35px;
  text-align: left;
  padding-left: 24px;
}

/* button press effect */
button:active {
  transform: scale(0.9);
  filter: brightness(1.3);
}
</style>
</head>

<body>

<div class="calculator">
  <input type="text" id="screen" readonly value="0">

  <div class="buttons">
    <button class="func">C</button>
    <button class="func">±</button>
    <button class="func">%</button>
    <button class="op">÷</button>

    <button class="num">7</button>
    <button class="num">8</button>
    <button class="num">9</button>
    <button class="op">×</button>

    <button class="num">4</button>
    <button class="num">5</button>
    <button class="num">6</button>
    <button class="op">−</button>

    <button class="num">1</button>
    <button class="num">2</button>
    <button class="num">3</button>
    <button class="op">+</button>

    <button class="num zero">0</button>
    <button class="num">.</button>
    <button class="op">=</button>
  </div>
</div>

<script>
const screen = document.getElementById("screen");
const buttons = document.querySelectorAll("button");

buttons.forEach(btn => {
  btn.addEventListener("click", () => {
    let value = btn.innerText;

    if (value === "C") {
      screen.value = "0";
    }
    else if (value === "=") {
      try {
        screen.value = eval(
          screen.value
          .replace(/×/g, "*")
          .replace(/÷/g, "/")
          .replace(/−/g, "-")
        );
      } catch {
        screen.value = "Error";
      }
    }
    else if (value === "±") {
      screen.value = parseFloat(screen.value) * -1;
    }
    else if (value === "%") {
      screen.value = parseFloat(screen.value) / 100;
    }
    else {
      if (screen.value === "0") screen.value = value;
      else screen.value += value;
    }
  });
});
</script>

</body>
</html>
